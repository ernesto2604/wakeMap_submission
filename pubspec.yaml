name: wake_map
description: "WakeMap - Location-based alarm app with Commuter and Traveller modes."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  provider: ^6.1.4
  http: ^1.3.0
  speech_to_text: ^7.3.0
  pointer_interceptor: ^0.10.1+2
  flutter_liquid_glass_plus: ^0.0.7
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: SF Pro Text
      fonts:
        - asset: assets/font/SF-Pro-Text-Regular.otf
          weight: 400
        - asset: assets/font/SF-Pro-Text-Medium.otf
          weight: 500
        - asset: assets/font/SF-Pro-Text-Semibold.otf
          weight: 600
        - asset: assets/font/SF-Pro-Text-Bold.otf
          weight: 700
    - family: SF Pro Display
      fonts:
        - asset: assets/font/SF-Pro-Display-Regular.otf
          weight: 400
        - asset: assets/font/SF-Pro-Display-Medium.otf
          weight: 500
        - asset: assets/font/SF-Pro-Display-Semibold.otf
          weight: 600
        - asset: assets/font/SF-Pro-Display-Bold.otf
          weight: 700
